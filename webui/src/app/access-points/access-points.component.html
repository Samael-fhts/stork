<div class="flex flex-column gap-3">
    @for (ap of daemon.accessPoints; track ap) {
        <div class="flex flex-wrap gap-2 align-items-center">
            <div class="font-medium capitalize-first flex-basis-quarter">{{ ap.type }}</div>
            <div>
                <span>{{ formatAddress(ap.address) }}:{{ ap.port }}</span>
                @if (ap.protocol === 'https' || ap.protocol === 'rndc') {
                    <span class="text-green-500 pi pi-lock pl-1" pTooltip="secured connection"></span>
                } @else {
                    <span class="text-red-500 pi pi-lock-open pl-1" pTooltip="unsecured connection"></span>
                }
                @if (daemon.name === 'named' && ap.protocol === 'rndc') {
                    <span
                        id="access-point-key"
                        appAccessType="read"
                        appAccessEntity="access-point-key"
                        [appHideIfNoAccess]="true"
                    >
                        Key:
                        <app-access-point-key [accessPointType]="ap.type" [daemonId]="daemon.id"></app-access-point-key>
                    </span>
                }
            </div>
        </div>
    }
</div>
