<div *ngFor="let d of daemons" class="inline-block">
    <a
        pTooltip="{{ daemonStatusIconTooltip(d) }}"
        [ngStyle]="{ color: daemonStatusIconColor(d) }"
        style="white-space: nowrap; margin: 0 0.5rem 0 0"
        routerLink="/daemons/{{ d.id }}"
    >
        <i class="{{ daemonStatusIconName(d) }} text-sm pr-1"></i>{{ d.name | daemonNiceName }}
    </a>
</div>
